name: Enrich Finviz with Business Descriptions

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml tqdm

      - name: Run enrichment script
        run: python scripts/enrich_finviz_descriptions.py

      - name: Upload enriched file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: finviz-enriched
          path: finviz_with_descriptions.csv
          retention-days: 30
