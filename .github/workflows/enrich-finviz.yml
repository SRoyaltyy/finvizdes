name: Enrich Finviz with Business Descriptions

on:
  workflow_dispatch:   # Manual trigger (recommended)
  # schedule:
  #   - cron: '0 3 * * 1'   # Optional: every Monday at 3am UTC

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml tqdm

      - name: Run enrichment script
        env:
          INPUT_FILE: data/finviz.csv
          OUTPUT_FILE: data/finviz_with_descriptions.csv
        run: python scripts/enrich_finviz_descriptions.py

      - name: Upload enriched CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: finviz-enriched
          path: data/finviz_with_descriptions.csv
          retention-days: 30

      # Optional: Commit the enriched file back to the repo
